spring.application.name=tienda
spring.mvc.patchmatch.matching-strategy= ant_path_matcher

logging,pattern.dateformat = hh:mm

spring.main.banner-mode = off

spring.thymeleaf.cache = false
#MYSQL e Hibernate
#spring.datasource.url = jdbc:mysql://127.0.0.1:3306/tienda
#spring.datasource.username=root
#spring.datasource.password=12345

spring.datasource.url=jdbc:mysql://localhost:3306/techshop
spring.datasource.username=root
spring.datasource.password=12345

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
 
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE
server.port = 8080

firebase.bucket.name=techshop-ee7d2.firebasestorage.app 
firebase.storage.path=techshop
firebase.json.path=firebase
firebase.json.file=techshop-ee7d2-firebase-adminsdk-fbsvc-aad09cc5e5.json